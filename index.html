<!DOCTYPE html>
<html>
<head>
<title>Game Mode 2</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}

#game{
  width:300px;
  height:300px;
  background:#222;
  margin:20px auto;
  position:relative;
  overflow:hidden;
}

#player{
  width:40px;
  height:40px;
  background:lime;
  position:absolute;
  bottom:10px;
  left:130px;
}

#coin{
  width:25px;
  height:25px;
  background:gold;
  position:absolute;
  top:10px;
  left:100px;
  border-radius:50%;
}
</style>
</head>

<body>

<h2>🎮 Mode 2</h2>
<p>Score: <span id="score">0</span></p>

<div id="game">
  <div id="player"></div>
  <div id="coin"></div>
</div>

<button onclick="left()">⬅️</button>
<button onclick="right()">➡️</button>

<script>
let player = document.getElementById("player");
let coin = document.getElementById("coin");
let score = 0;
let x = 130;

function left(){
  x -= 20;
  player.style.left = x + "px";
  check();
}

function right(){
  x += 20;
  player.style.left = x + "px";
  check();
}

function moveCoin(){
  coin.style.left = Math.random()*260 + "px";
}

function check(){
  let px = player.offsetLeft;
  let cx = coin.offsetLeft;

  if(Math.abs(px - cx) < 30){
    score++;
    document.getElementById("score").innerText = score;
    moveCoin();
  }
}

moveCoin();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zombie Game</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0b0f14;
    overflow: hidden;
    color: white;
  }

  /* ===== الشاشات ===== */
  .screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
  }

  .active {
    display: block;
  }

  /* ===== القائمة ===== */
  #menu {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 15px;
  }

  h1 {
    font-size: 40px;
    margin-bottom: 30px;
  }

  button {
    width: 200px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    background: #1f6fff;
    color: white;
  }

  button:active {
    transform: scale(0.95);
  }

  /* ===== HUD ===== */
  #hud {
    position: absolute;
    top: 10px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 15px;
    font-size: 16px;
    z-index: 10;
  }

  /* ===== HP BAR ===== */
  .hp-container {
    width: 120px;
    height: 12px;
    background: #2a2a2a;
    border-radius: 6px;
    overflow: hidden;
    margin-top: 3px;
  }

  .hp-bar {
    width: 100%;
    height: 100%;
    background: #00ff4c;
  }

  /* ===== اللعبة ===== */
  #gameArea {
    width: 100%;
    height: 100%;
    background: radial-gradient(#111, #05070a);
    position: relative;
  }

  /* ===== اللاعب ===== */
  #player {
    width: 25px;
    height: 25px;
    background: #00a2ff;
    border-radius: 5px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* ===== التحكم ===== */
  #controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
  }

  .joystick {
    width: 90px;
    height: 90px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    position: relative;
  }

  .stick {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    position: absolute;
    top: 25px;
    left: 25px;
  }
  .attack {
    width: 80px;
    height: 80px;
    background: red;
    border-radius: 50%;
  }
  #zombie {
  width: 25px;
  height: 25px;
  background: green;
  position: absolute;
  border-radius: 5px;
}
</style>
</head>

<body>

<!-- ===== القائمة ===== -->
<div id="menu" class="screen active">
  <h1>Zombie Survival</h1>
  <button onclick="startGame()">ابدأ اللعب</button>
  <button onclick="openShop()">المتجر</button>
  <button onclick="openSettings()">الإعدادات</button>
</div>

<!-- ===== اللعبة ===== -->
<div id="game" class="screen">

  <div id="hud">
    <div>💰 0</div>

    <div class="hp-container">
      <div class="hp-bar" id="hp"></div>
    </div>

    <div>🔫 Knife</div>
  </div>

  <div id="gameArea">
    <div id="player"></div>
    <div id="zombie"></div>
  </div>

  <div id="controls">
    <div class="joystick" id="joystick">
      <div class="stick" id="stick"></div>
    </div>

    <div class="attack"></div>
  </div>

</div>

<!-- ===== المتجر ===== -->
<div id="shop" class="screen">
  <h2 style="text-align:center; margin-top:50px;">Shop</h2>
  <button onclick="backMenu()">رجوع</button>
</div>

<!-- ===== الإعدادات ===== -->
<div id="settings" class="screen">
  <h2 style="text-align:center; margin-top:50px;">Settings</h2>
  <button onclick="backMenu()">رجوع</button>
</div>

<script>

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame(){ showScreen('game'); }
function openShop(){ showScreen('shop'); }
function openSettings(){ showScreen('settings'); }
function backMenu(){ showScreen('menu'); }

/* ===== PLAYER MOVEMENT ===== */
let player = document.getElementById("player");

let posX = window.innerWidth / 2;
let posY = window.innerHeight / 2;

let moveX = 0;
let moveY = 0;
let speed = 3;

function update(){
  posX += moveX * speed;
  posY += moveY * speed;

  player.style.left = posX + "px";
  player.style.top = posY + "px";

  requestAnimationFrame(update);
}
update();

/* ===== JOYSTICK ===== */
let joystick = document.getElementById("joystick");
let stick = document.getElementById("stick");

let dragging = false;

joystick.addEventListener("touchstart", () => {
  dragging = true;
});

joystick.addEventListener("touchend", () => {
  dragging = false;
  moveX = 0;
  moveY = 0;

  stick.style.left = "25px";
  stick.style.top = "25px";
});

joystick.addEventListener("touchmove", (e) => {
  if (!dragging) return;

  let rect = joystick.getBoundingClientRect();

  let x = e.touches[0].clientX - rect.left - 45;
  let y = e.touches[0].clientY - rect.top - 45;

  let max = 30;

  if (x > max) x = max;
  if (x < -max) x = -max;
  if (y > max) y = max;
  if (y < -max) y = -max;

  stick.style.left = 25 + x + "px";
  stick.style.top = 25 + y + "px";

  moveX = x / max;
  moveY = y / max;
});
let zombie = document.getElementById("zombie");

let zX = 100;
let zY = 100;

let zSpeed = 1.5;

function updateZombie(){
if (!zombieAlive) return;

let dx = posX - zX;
let dy = posY - zY;

let dist = Math.sqrt(dx * dx + dy * dy);

zX += (dx / dist) * zSpeed;
zY += (dy / dist) * zSpeed;

zombie.style.left = zX + "px";
zombie.style.top = zY + "px";

requestAnimationFrame(updateZombie);
  let dx = posX - zX;
  let dy = posY - zY;

  let dist = Math.sqrt(dx*dx + dy*dy);

  zX += (dx / dist) * zSpeed;
  zY += (dy / dist) * zSpeed;

  zombie.style.left = zX + "px";
  zombie.style.top = zY + "px";

  requestAnimationFrame(updateZombie);
}
updateZombie();
  let hp = 100;
let hpBar = document.getElementById("hp");

function checkHit(){
  let dx = posX - zX;
  let dy = posY - zY;

  let distance = Math.sqrt(dx*dx + dy*dy);

  // إذا قريب جدًا = ضرر
  if (distance < 25) {
    hp -= 0.5; // مقدار الضرر

    if (hp < 0) hp = 0;

    hpBar.style.width = hp + "%";
  }

  requestAnimationFrame(checkHit);
}

checkHit();
  let coins = 0;

let attackBtn = document.querySelector(".attack");
let zombieAlive = true;

// عند الضغط على زر الهجوم
attackBtn.addEventListener("click", () => {
  let dx = posX - zX;
  let dy = posY - zY;

  let distance = Math.sqrt(dx*dx + dy*dy);

  // إذا الزومبي قريب = قتله
  if (distance < 50 && zombieAlive) {
    zombieAlive = false;

    // فلوس
    coins += 10;
    document.querySelector("#hud div").innerHTML = "💰 " + coins;

    // رجع الزومبي بعد ثانيتين
    setTimeout(() => {
      zX = Math.random() * window.innerWidth;
      zY = Math.random() * window.innerHeight;
      zombieAlive = true;
    }, 2000);
  }
});
</script>

</body>
</html>

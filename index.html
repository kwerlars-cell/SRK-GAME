<!DOCTYPE html>
<html>
<head>
<title>My Game</title>

<style>
body{
  text-align:center;
  background:#111;
  color:white;
  font-family:Arial;
}

#game{
  width:300px;
  height:300px;
  background:#222;
  margin:auto;
  position:relative;
  overflow:hidden;
}

#player{
  width:40px;
  height:40px;
  background:lime;
  position:absolute;
  bottom:10px;
  left:130px;
}
</style>
</head>

<body>

<h2>🎮 Stage 1</h2>

<div id="game">
  <div id="player"></div>
</div>

<br>

<button onclick="left()">⬅️</button>
<button onclick="right()">➡️</button>

<script>
let player = document.getElementById("player");
let x = 130;

function left(){
  x -= 20;
  player.style.left = x + "px";
}

function right(){
  x += 20;
  player.style.left = x + "px";
}
</script>

</body>
</html>

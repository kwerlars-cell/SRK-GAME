<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zombie Game</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0b0f14;
    overflow: hidden;
    color: white;
  }

  /* ===== الشاشات ===== */
  .screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
  }

  .active {
    display: block;
  }

  /* ===== القائمة ===== */
  #menu {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 15px;
  }

  h1 {
    font-size: 40px;
    margin-bottom: 30px;
  }

  button {
    width: 200px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    background: #1f6fff;
    color: white;
  }

  button:active {
    transform: scale(0.95);
  }

  /* ===== HUD ===== */
  #hud {
    position: absolute;
    top: 10px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 15px;
    font-size: 16px;
    z-index: 10;
  }

  /* ===== شريط الدم ===== */
  .hp-container {
    width: 120px;
    height: 12px;
    background: #2a2a2a;
    border-radius: 6px;
    overflow: hidden;
    margin-top: 3px;
  }

  .hp-bar {
    width: 100%;
    height: 100%;
    background: #00ff4c;
  }

  /* ===== منطقة اللعب ===== */
  #gameArea {
    width: 100%;
    height: 100%;
    background: radial-gradient(#111, #05070a);
  }

  /* ===== التحكم ===== */
  #controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
  }

  .joystick {
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
  }

  .attack {
    width: 80px;
    height: 80px;
    background: red;
    border-radius: 50%;
  }
</style>

</head>

<body>

<!-- ===== القائمة الرئيسية ===== -->
<div id="menu" class="screen active">
  <h1>Zombie Survival</h1>
  <button onclick="startGame()">ابدأ اللعب</button>
  <button onclick="openShop()">المتجر</button>
  <button onclick="openSettings()">الإعدادات</button>
</div>

<!-- ===== اللعبة ===== -->
<div id="game" class="screen">
  <div id="hud">
    <div>💰 0</div>

    <div>
      <div class="hp-container">
        <div class="hp-bar" id="hp"></div>
      </div>
    </div>

    <div>🔫 Knife</div>
  </div>

  <div id="gameArea"></div>

  <div id="controls">
    <div class="joystick"></div>
    <div class="attack"></div>
  </div>
</div>

<!-- ===== المتجر ===== -->
<div id="shop" class="screen">
  <h2 style="text-align:center; margin-top:50px;">Shop</h2>
  <button onclick="backMenu()">رجوع</button>
</div>

<!-- ===== الإعدادات ===== -->
<div id="settings" class="screen">
  <h2 style="text-align:center; margin-top:50px;">Settings</h2>
  <button onclick="backMenu()">رجوع</button>
</div>

<script>
  function showScreen(id){
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function startGame(){
    showScreen('game');
  }

  function openShop(){
    showScreen('shop');
  }

  function openSettings(){
    showScreen('settings');
  }

  function backMenu(){
    showScreen('menu');
  }
</script>

</body>
</html>

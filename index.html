<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Safe Zombie Game</title>

<style>
body{margin:0;overflow:hidden;background:#0b0f14;font-family:Arial;}

.screen{position:absolute;width:100%;height:100%;display:none;}
.active{display:block;}

#menu{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:15px;
  color:white;
}

button{width:200px;padding:12px;font-size:18px;}

#gameArea{
  width:100vw;height:100vh;position:relative;
  background:radial-gradient(#111,#05070a);
}

#player{
  width:25px;height:25px;background:#00a2ff;
  position:absolute;
}

.zombie{
  width:25px;height:25px;background:#00ff00;
  position:absolute;
}

.boss{
  width:40px;height:40px;background:red;
  position:absolute;
}

#joystick{
  position:absolute;bottom:20px;left:20px;
  width:90px;height:90px;background:#ffffff22;
  border-radius:50%;
}

#stick{
  width:40px;height:40px;background:#fff5;
  border-radius:50%;
  position:absolute;top:25px;left:25px;
}

#attack{
  position:absolute;bottom:20px;right:20px;
  width:70px;height:70px;background:red;border-radius:50%;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
  <h1 style="color:white;">Zombie Game</h1>
  <button onclick="start()">ابدأ</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

<div id="gameArea">
  <div id="player"></div>
</div>

<div id="joystick"><div id="stick"></div></div>
<div id="attack"></div>

</div>

<script>
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function start(){
  show("game");
}

/* ===== IMPORTANT VARIABLES (TOP) ===== */
let level = 1;
let round = 1;

let x = 200;
let y = 200;

let mx = 0;
let my = 0;

let speed = 3;

let zombies = [];

/* ===== PLAYER ===== */
let player = document.getElementById("player");

/* ===== GAME SPAWN ===== */
function spawn(){

  zombies = [];

  document.querySelectorAll(".zombie").forEach(z => z.remove());

  let count = 2 + round + level;

  for(let i=0;i<count;i++){

    let el = document.createElement("div");
    el.className = "zombie";
    document.getElementById("gameArea").appendChild(el);

    zombies.push({
      el: el,
      x: Math.random()*300,
      y: Math.random()*300,
      speed: 1 + level*0.2
    });
  }
}

/* ===== PLAYER MOVE ===== */
function updatePlayer(){

  x += mx * speed;
  y += my * speed;

  player.style.left = x + "px";
  player.style.top = y + "px";

  requestAnimationFrame(updatePlayer);
}

/* ===== ZOMBIES MOVE ===== */
function updateZombies(){

  zombies.forEach(z=>{

    let dx = x - z.x;
    let dy = y - z.y;

    let d = Math.sqrt(dx*dx + dy*dy);

    if(d === 0) return;

    z.x += (dx/d) * z.speed;
    z.y += (dy/d) * z.speed;

    z.el.style.left = z.x + "px";
    z.el.style.top = z.y + "px";
  });

  requestAnimationFrame(updateZombies);
}

/* ===== DAMAGE ===== */
function damage(){

  zombies.forEach(z=>{

    let dx = x - z.x;
    let dy = y - z.y;

    let d = Math.sqrt(dx*dx + dy*dy);

    if(d < 25){
      console.log("hit");
    }
  });

  requestAnimationFrame(damage);
}

/* ===== ATTACK ===== */
document.getElementById("attack").onclick = () => {

  zombies.forEach(z=>{

    let dx = x - z.x;
    let dy = y - z.y;

    let d = Math.sqrt(dx*dx + dy*dy);

    if(d < 50){
      z.el.remove();
    }
  });
};

/* ===== JOYSTICK ===== */
let joy = document.getElementById("joystick");
let stick = document.getElementById("stick");

let drag = false;

joy.addEventListener("touchstart", ()=> drag = true);

joy.addEventListener("touchend", ()=>{
  drag = false;
  mx = 0;
  my = 0;
  stick.style.left = "25px";
  stick.style.top = "25px";
});

joy.addEventListener("touchmove", (e)=>{

  if(!drag) return;

  let r = joy.getBoundingClientRect();

  let xx = e.touches[0].clientX - r.left - 45;
  let yy = e.touches[0].clientY - r.top - 45;

  let max = 30;

  if(xx > max) xx = max;
  if(xx < -max) xx = -max;
  if(yy > max) yy = max;
  if(yy < -max) yy = -max;

  stick.style.left = 25 + xx + "px";
  stick.style.top = 25 + yy + "px";

  mx = xx / max;
  my = yy / max;
});

/* ===== START GAME ===== */
spawn();
updatePlayer();
updateZombies();
damage();
</script>

</body>
</html>
